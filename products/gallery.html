<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
    background:#f5f7fa;
}

header{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:45px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

.container{
    width:90%;
    max-width:1300px;
    margin:50px auto;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.gallery-item{
    overflow:hidden;
    border-radius:20px;
    background:white;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    transition:.4s;
}

.gallery-item:hover{
    transform:translateY(-10px);
}

.gallery-item img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:.5s;
}

.gallery-item:hover img{
    transform:scale(1.1);
}

.back{
    display:inline-block;
    margin:50px auto;
    padding:15px 35px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:40px;
    transition:.3s;
}

.back:hover{
    background:#06b6d4;
}

.center{
    text-align:center;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>
